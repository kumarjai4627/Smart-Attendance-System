{% extends "layout/base.html" %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-header bg-warning text-dark text-center rounded-top-4 py-3">

                <h3 class="mb-0">
                    <i class="bi bi-pencil-square"></i>
                    Edit Student
                </h3>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-person-badge"></i>
                            Student ID
                        </label>

                        <input
                            type="text"
                            name="student_id"
                            class="form-control form-control-lg"
                            value="{{ student[1] }}"
                            required>
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-person-fill"></i>
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            value="{{ student[2] }}"
                            required>
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-envelope-fill"></i>
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control form-control-lg"
                            value="{{ student[3] }}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-telephone-fill"></i>
                            Phone
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control form-control-lg"
                            value="{{ student[4] }}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-mortarboard-fill"></i>
                            Course
                        </label>

                        <input
                            type="text"
                            name="course"
                            class="form-control form-control-lg"
                            value="{{ student[5] }}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-building"></i>
                            Branch
                        </label>

                        <input
                            type="text"
                            name="branch"
                            class="form-control form-control-lg"
                            value="{{ student[6] }}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-book-half"></i>
                            Semester
                        </label>

                        <input
                            type="number"
                            name="semester"
                            class="form-control form-control-lg"
                            value="{{ student[7] }}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-grid-3x3-gap-fill"></i>
                            Section
                        </label>

                        <input
                            type="text"
                            name="section"
                            class="form-control form-control-lg"
                            value="{{ student[8] }}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-gender-ambiguous"></i>
                            Gender
                        </label>

                        <select name="gender" class="form-select form-select-lg">

                            <option value="Male"
                                {% if student[9]=="Male" %}selected{% endif %}>
                                Male
                            </option>

                            <option value="Female"
                                {% if student[9]=="Female" %}selected{% endif %}>
                                Female
                            </option>

                            <option value="Other"
                                {% if student[9]=="Other" %}selected{% endif %}>
                                Other
                            </option>

                        </select>

                    </div>


                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            <i class="bi bi-calendar-event-fill"></i>
                            Date of Birth
                        </label>

                        <input
                            type="date"
                            name="dob"
                            class="form-control form-control-lg"
                            value="{{ student[10] }}">

                    </div>


                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            <i class="bi bi-geo-alt-fill"></i>
                            Address
                        </label>

                        <textarea
                            name="address"
                            rows="4"
                            class="form-control form-control-lg">{{ student[11] }}</textarea>

                    </div>


                    <div class="text-center">

                        <button class="btn btn-warning btn-lg px-5 me-3">

                            <i class="bi bi-check-circle-fill"></i>

                            Update Student

                        </button>

                        <a href="/students"
                           class="btn btn-secondary btn-lg px-5">

                            <i class="bi bi-arrow-left-circle-fill"></i>

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
