<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">

    <label>Student ID</label><br>
    <input type="text" name="student_id" value="{{ student[1] }}" required><br><br>

    <label>Name</label><br>
    <input type="text" name="name" value="{{ student[2] }}" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" value="{{ student[3] }}"><br><br>

    <label>Phone</label><br>
    <input type="text" name="phone" value="{{ student[4] }}"><br><br>

    <label>Course</label><br>
    <input type="text" name="course" value="{{ student[5] }}"><br><br>

    <label>Branch</label><br>
    <input type="text" name="branch" value="{{ student[6] }}"><br><br>

    <label>Semester</label><br>
    <input type="number" name="semester" value="{{ student[7] }}"><br><br>

    <label>Section</label><br>
    <input type="text" name="section" value="{{ student[8] }}"><br><br>

    <label>Gender</label><br>
    <input type="text" name="gender" value="{{ student[9] }}"><br><br>

    <label>Date of Birth</label><br>
    <input type="date" name="dob" value="{{ student[10] }}"><br><br>

    <label>Address</label><br>
    <textarea name="address">{{ student[11] }}</textarea><br><br>

    <button type="submit">Update Student</button>

</form>

</body>
</html>
